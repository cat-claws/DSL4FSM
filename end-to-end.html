<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FSM Pipeline UI</title>
  <style>
    body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: #ffffff; color: #222; }
    .wrap { max-width: 1400px; margin: 16px auto; padding: 0 12px; }
    .card { padding: 10px 2px; margin-bottom: 10px; background: #fff; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    h2, h3 { margin: 0 0 8px; font-weight: 600; }
    label { display: block; margin: 8px 0 4px; font-size: 12px; color: #333; }
    select, input, textarea, button { width: 100%; box-sizing: border-box; border: 1px solid #999; border-radius: 0; padding: 8px; font: inherit; }
    textarea { min-height: 220px; font-family: "Courier New", Courier, monospace; font-size: 12px; }
    button { background: #efefef; color: #111; cursor: pointer; font-weight: 600; margin-top: 10px; }
    .code { white-space: pre-wrap; max-height: 300px; overflow: auto; background: #fff; padding: 8px; font-family: "Courier New", Courier, monospace; font-size: 12px; }
    .pill { padding: 8px; font-size: 13px; }
    .error { color: #b00020; white-space: pre-wrap; }
    .ok { color: #106810; }
    .svgbox { background: #fff; overflow: auto; min-height: 500px; }
    .svgbox svg { width: 100%; height: auto; display: block; }
    @media (max-width: 900px) { .grid2, .grid3 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h2 style="margin:0 0 6px;">FSM Build + Verify + Visualize</h2>
      <div>Static HTML frontend + backend process APIs.</div>
      <div id="apiBaseInfo" style="margin-top:6px; font-size:12px;"></div>
    </div>

    <div class="card">
      <div class="grid2">
        <div>
          <h3>Plan</h3>
          <label>Example (preload)</label>
          <select id="planExample"></select>
          <label>Plan JSON</label>
          <textarea id="planJson" placeholder='{"goal":"...","steps":[...]}'></textarea>
        </div>

        <div>
          <h3>Property</h3>
          <label>Example (preload)</label>
          <select id="propExample"></select>
          <label>Property JSON</label>
          <textarea id="propJson" placeholder='{"property":"..."}'></textarea>
        </div>
      </div>
      <div class="grid2" style="margin-top:10px;">
        <div>
          <label>Model</label>
          <input id="model" value="llama3.3:latest">
        </div>
        <div>
          <label>Timeout seconds</label>
          <input id="timeoutSec" value="120">
        </div>
      </div>
      <button id="runBtn">Run Pipeline</button>
      <div id="status" style="margin-top:8px;"></div>
    </div>

    <div id="resultBlock" style="display:none;">
      <div class="card">
        <h3>Verification Summary</h3>
        <div class="grid3">
          <div class="pill"><b>Run ID</b><br><span id="runId"></span></div>
          <div class="pill"><b>Backend</b><br><span id="backend"></span></div>
          <div class="pill"><b>Run Dir</b><br><span id="runDir"></span></div>
        </div>
        <div class="grid3" style="margin-top:10px;">
          <div class="pill"><b>Full</b><br><span id="fullStatus"></span></div>
          <div class="pill"><b>Trace</b><br><span id="traceStatus"></span></div>
          <div class="pill"><b>Exit codes</b><br><span id="exitCodes"></span></div>
        </div>
        <label style="margin-top:10px;">Generated Trace Symbols</label>
        <div id="traceSpec" class="code"></div>
        <label style="margin-top:10px;">FSM Consistency Report</label>
        <div id="consistencySpec" class="code"></div>
        <label style="margin-top:10px;">Verifier Spec (from generated FSM JSON)</label>
        <div id="verifierSpec" class="code"></div>
        <label style="margin-top:10px;">Inspection Command</label>
        <div id="inspectionSpec" class="code"></div>
      </div>

      <div class="card">
        <h3>FSM Graph</h3>
        <div id="svgBox" class="svgbox"></div>
      </div>

      <div class="card">
        <h3>Inputs and Generated FSM</h3>
        <div class="grid2">
          <div>
            <label>Plan in use</label>
            <div id="planUsed" class="code"></div>
          </div>
          <div>
            <label>Property in use</label>
            <div id="propUsed" class="code"></div>
          </div>
        </div>
        <label>Generated FSM JSON</label>
        <div id="fsmJson" class="code"></div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = "https://hee-exhibitive-proterandrously.ngrok-free.dev/fsm";
    document.getElementById('apiBaseInfo').textContent = "API Base: " + API_BASE;

    async function jget(url) {
      const r = await fetch(API_BASE + url, {
        headers: {
          'ngrok-skip-browser-warning': 'true'
        }
      });
      if (!r.ok) throw new Error(await r.text());
      return r.json();
    }

    function setStatus(msg, isErr=false) {
      const el = document.getElementById('status');
      el.className = isErr ? 'error' : 'ok';
      el.textContent = msg;
    }

    async function loadExamples() {
      const data = await jget('/api/examples');
      const planSel = document.getElementById('planExample');
      const propSel = document.getElementById('propExample');
      planSel.innerHTML = '';
      propSel.innerHTML = '';
      const emptyPlan = document.createElement('option');
      emptyPlan.value = '';
      emptyPlan.textContent = '(none)';
      planSel.appendChild(emptyPlan);
      for (const n of data.plans || []) {
        const o = document.createElement('option');
        o.value = n; o.textContent = n; planSel.appendChild(o);
      }
      const emptyProp = document.createElement('option');
      emptyProp.value = '';
      emptyProp.textContent = '(none)';
      propSel.appendChild(emptyProp);
      for (const n of data.properties || []) {
        const o = document.createElement('option');
        o.value = n; o.textContent = n; propSel.appendChild(o);
      }
      planSel.value = '';
      propSel.value = '';
      await refreshPreviews();
    }

    async function loadExampleContent(kind, name) {
      const qs = new URLSearchParams({kind, name});
      return jget('/api/example-content?' + qs.toString());
    }

    async function refreshPreviews() {
      const planJson = document.getElementById('planJson');
      const propJson = document.getElementById('propJson');
      const planName = document.getElementById('planExample').value;
      const propName = document.getElementById('propExample').value;
      if (planName) {
        const data = await loadExampleContent('plan', planName);
        planJson.value = data.text || '';
      }
      if (propName) {
        const data = await loadExampleContent('property', propName);
        propJson.value = data.text || '';
      }
    }

    async function runPipeline() {
      setStatus('Submitting job...');
      document.getElementById('resultBlock').style.display = 'none';
      const payload = {
        plan_source: 'input',
        property_source: 'input',
        plan_json: document.getElementById('planJson').value,
        property_json: document.getElementById('propJson').value,
        model: document.getElementById('model').value,
        timeout_sec: parseInt(document.getElementById('timeoutSec').value, 10),
        async: true
      };
      const r = await fetch(API_BASE + '/api/run', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'ngrok-skip-browser-warning': 'true'
        },
        body: JSON.stringify(payload)
      });
      const data = await r.json();
      if (!r.ok) {
        setStatus(data.error || 'Request failed', true);
        return;
      }
      const jobId = data.job_id;
      if (!jobId) {
        setStatus('Missing job_id from backend', true);
        return;
      }
      setStatus('Job queued: ' + jobId);

      const startedAt = Date.now();
      let result = null;
      while (true) {
        if (Date.now() - startedAt > 30 * 60 * 1000) {
          setStatus('Timed out waiting for backend job', true);
          return;
        }
        await new Promise(res => setTimeout(res, 2000));
        const s = await jget('/api/run-status?job_id=' + encodeURIComponent(jobId));
        if (s.status === 'queued' || s.status === 'running') {
          setStatus('Running job: ' + jobId + ' (' + s.status + ')');
          continue;
        }
        if (s.status === 'error') {
          setStatus(s.error || 'Job failed', true);
          return;
        }
        if (s.status === 'done') {
          result = s.result || {};
          break;
        }
        setStatus('Unexpected job status: ' + String(s.status), true);
        return;
      }

      setStatus('Done.');
      const v = result.verification || {};
      document.getElementById('runId').textContent = result.run_id || '';
      document.getElementById('backend').textContent = result.backend || '';
      document.getElementById('runDir').textContent = result.run_dir || '';
      document.getElementById('fullStatus').textContent = `${v.full.status} (${v.full.reason})`;
      document.getElementById('traceStatus').textContent = `${v.trace.status} (${v.trace.reason})`;
      document.getElementById('exitCodes').textContent = `full=${v.full.exit_code}, trace=${v.trace.exit_code}`;
      document.getElementById('traceSpec').textContent = JSON.stringify(result.trace || {}, null, 2);
      document.getElementById('consistencySpec').textContent = JSON.stringify(result.consistency_report || {}, null, 2);
      document.getElementById('verifierSpec').textContent = JSON.stringify(result.verifier_properties || {}, null, 2);
      document.getElementById('inspectionSpec').textContent = JSON.stringify(result.inspection || {}, null, 2);
      document.getElementById('svgBox').innerHTML = result.annotated_svg || '';
      document.getElementById('planUsed').textContent = result.plan_text || '';
      document.getElementById('propUsed').textContent = result.property_text || '';
      document.getElementById('fsmJson').textContent = result.fsm_text || '';
      document.getElementById('resultBlock').style.display = '';
    }

    document.getElementById('runBtn').addEventListener('click', () => {
      runPipeline().catch(e => setStatus(String(e), true));
    });

    document.getElementById('planExample').addEventListener('change', () => refreshPreviews().catch(e => setStatus(String(e), true)));
    document.getElementById('propExample').addEventListener('change', () => refreshPreviews().catch(e => setStatus(String(e), true)));

    loadExamples().catch(e => setStatus(String(e), true));
  </script>
</body>
</html>
