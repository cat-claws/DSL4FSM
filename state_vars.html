<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>State Variables UI</title>
  <style>
    body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: #fff; color: #222; }
    .wrap { max-width: 1200px; margin: 16px auto; padding: 0 12px; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    label { display: block; margin: 8px 0 4px; font-size: 12px; color: #333; }
    select, input, textarea, button { width: 100%; box-sizing: border-box; border: 1px solid #999; border-radius: 0; padding: 8px; font: inherit; }
    textarea { min-height: 220px; font-family: "Courier New", Courier, monospace; font-size: 12px; }
    button { background: #efefef; color: #111; cursor: pointer; font-weight: 600; margin-top: 10px; }
    .code { white-space: pre-wrap; max-height: 420px; overflow: auto; font-family: "Courier New", Courier, monospace; font-size: 12px; border: 1px solid #999; padding: 8px; }
    .ok { color: #106810; white-space: pre-wrap; }
    .error { color: #b00020; white-space: pre-wrap; }
    table { border-collapse: collapse; width: 100%; font-size: 12px; }
    th, td { border: 1px solid #999; padding: 6px; text-align: left; vertical-align: top; }
    th { background: #f7f7f7; }
    @media (max-width: 900px) { .grid2 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <h2 style="margin:0 0 6px;">State Variable Schema Builder</h2>
    <div style="margin-bottom:8px; font-size:12px;" id="apiBaseInfo"></div>

    <div class="grid2">
      <div>
        <h3>Plan</h3>
        <label>Example (preload)</label>
        <select id="planExample"></select>
        <label>Plan JSON</label>
        <textarea id="planJson" placeholder='{"goal":"...","steps":[...]}'></textarea>
      </div>
      <div>
        <h3>Property</h3>
        <label>Example (preload)</label>
        <select id="propExample"></select>
        <label>Property JSON</label>
        <textarea id="propJson" placeholder='{"type":"globally",...}'></textarea>
      </div>
    </div>

    <div class="grid2" style="margin-top:10px;">
      <div>
        <label>Model</label>
        <input id="model" value="llama3.3:latest">
      </div>
      <div>
        <label>Timeout seconds</label>
        <input id="timeoutSec" value="120">
      </div>
    </div>

    <button id="runBtn">Generate State Variables</button>
    <div id="status" style="margin-top:8px;"></div>

    <h3 style="margin:12px 0 6px;">Output</h3>
    <div id="meta" class="code"></div>
    <h3 style="margin:12px 0 6px;">State Variable Schema</h3>
    <div id="varsOut" class="code" style="margin-top:8px;"></div>
    <h3 style="margin:12px 0 6px;">Current State Observation</h3>
    <div id="obsMeta" class="code"></div>
    <div id="obsOut" class="code" style="margin-top:8px;"></div>
    <div id="stateViz" style="margin-top:8px;"></div>
  </div>

  <script>
    const API_BASE = "https://hee-exhibitive-proterandrously.ngrok-free.dev/fsm";
    document.getElementById("apiBaseInfo").textContent = "API Base: " + API_BASE;

    function setStatus(msg, isErr=false) {
      const el = document.getElementById("status");
      el.className = isErr ? "error" : "ok";
      el.textContent = msg;
    }

    async function jget(url) {
      const r = await fetch(API_BASE + url, { headers: { "ngrok-skip-browser-warning": "true" } });
      if (!r.ok) throw new Error(await r.text());
      return r.json();
    }

    async function submitAndWait(path, payload, waitingLabel) {
      const r = await fetch(API_BASE + path, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "ngrok-skip-browser-warning": "true"
        },
        body: JSON.stringify(payload)
      });
      const d = await r.json();
      if (!r.ok) throw new Error(d.error || "Request failed");
      const jobId = d.job_id;
      if (!jobId) throw new Error("Missing job_id from backend");

      const start = Date.now();
      while (true) {
        if (Date.now() - start > 30 * 60 * 1000) {
          throw new Error("Timed out waiting for backend job");
        }
        await new Promise(res => setTimeout(res, 2000));
        const s = await jget("/api/run-status?job_id=" + encodeURIComponent(jobId));
        if (s.status === "queued" || s.status === "running") {
          setStatus(waitingLabel + ": " + jobId + " (" + s.status + ")");
          continue;
        }
        if (s.status === "error") throw new Error(s.error || "Job failed");
        if (s.status === "done") return s.result || {};
        throw new Error("Unexpected job status: " + String(s.status));
      }
    }

    async function loadExamples() {
      const data = await jget("/api/examples");
      const planSel = document.getElementById("planExample");
      const propSel = document.getElementById("propExample");

      planSel.innerHTML = "";
      propSel.innerHTML = "";
      const p0 = document.createElement("option");
      p0.value = ""; p0.textContent = "(none)";
      planSel.appendChild(p0);
      for (const n of data.plans || []) {
        const o = document.createElement("option");
        o.value = n; o.textContent = n; planSel.appendChild(o);
      }
      const r0 = document.createElement("option");
      r0.value = ""; r0.textContent = "(none)";
      propSel.appendChild(r0);
      for (const n of data.properties || []) {
        const o = document.createElement("option");
        o.value = n; o.textContent = n; propSel.appendChild(o);
      }
    }

    async function loadExampleContent(kind, name) {
      const qs = new URLSearchParams({kind, name});
      return jget("/api/example-content?" + qs.toString());
    }

    async function refreshPreviews() {
      const pn = document.getElementById("planExample").value;
      const rn = document.getElementById("propExample").value;
      if (pn) {
        const d = await loadExampleContent("plan", pn);
        document.getElementById("planJson").value = d.text || "";
      }
      if (rn) {
        const d = await loadExampleContent("property", rn);
        document.getElementById("propJson").value = d.text || "";
      }
    }

    async function runStateVars() {
      document.getElementById("meta").textContent = "";
      document.getElementById("varsOut").textContent = "";
      document.getElementById("obsMeta").textContent = "";
      document.getElementById("obsOut").textContent = "";
      document.getElementById("stateViz").innerHTML = "";

      const basePayload = {
        plan_source: "input",
        property_source: "input",
        plan_json: document.getElementById("planJson").value,
        property_json: document.getElementById("propJson").value,
        model: document.getElementById("model").value,
        timeout_sec: parseInt(document.getElementById("timeoutSec").value, 10)
      };
      setStatus("Submitting state variable job...");

      const varsResult = await submitAndWait(
        "/api/state-vars-run",
        { ...basePayload, async: true },
        "Running state-vars job"
      );
      document.getElementById("meta").textContent = JSON.stringify({
        run_id: varsResult.run_id || "",
        run_dir: varsResult.run_dir || "",
        count: varsResult.count || 0
      }, null, 2);
      document.getElementById("varsOut").textContent =
        varsResult.variables_text || JSON.stringify(varsResult.variables || [], null, 2);

      setStatus("Submitting state observation job...");
      const obsResult = await submitAndWait(
        "/api/state-observe-run",
        {
          ...basePayload,
          async: true,
          variables_json: varsResult.variables_text || JSON.stringify(varsResult.variables || [])
        },
        "Running state-observation job"
      );
      document.getElementById("obsMeta").textContent = JSON.stringify({
        run_id: obsResult.run_id || "",
        run_dir: obsResult.run_dir || ""
      }, null, 2);
      document.getElementById("obsOut").textContent =
        obsResult.observation_text || JSON.stringify(obsResult.observation || {}, null, 2);
      renderStateViz(obsResult.observation || {});
      setStatus("Done.");
    }

    function renderStateViz(obs) {
      const order = Array.isArray(obs.state_order) ? obs.state_order : [];
      const st = obs.state || {};
      const tuple = Array.isArray(obs.state_tuple) ? obs.state_tuple : [];
      if (!order.length) {
        document.getElementById("stateViz").innerHTML = "<div class='error'>No state_order in observation output.</div>";
        return;
      }
      const rows = order.map((name, i) => {
        const val = Object.prototype.hasOwnProperty.call(st, name) ? st[name] : null;
        const typ = Number.isInteger(val) ? "int" : (typeof val === "number" ? "float" : "categorical");
        return `<tr><td>${name}</td><td>${typ}</td><td><code>${JSON.stringify(val)}</code></td><td>${i}</td></tr>`;
      }).join("");
      document.getElementById("stateViz").innerHTML =
        "<div style='margin-bottom:6px;'><b>Current state tuple:</b> <code>" +
        JSON.stringify(tuple) +
        "</code></div>" +
        "<table><thead><tr><th>Variable</th><th>Type</th><th>Observed Value</th><th>Order</th></tr></thead><tbody>" +
        rows +
        "</tbody></table>";
    }

    document.getElementById("runBtn").addEventListener("click", () => {
      runStateVars().catch(e => setStatus(String(e), true));
    });
    document.getElementById("planExample").addEventListener("change", () => refreshPreviews().catch(e => setStatus(String(e), true)));
    document.getElementById("propExample").addEventListener("change", () => refreshPreviews().catch(e => setStatus(String(e), true)));

    loadExamples().catch(e => setStatus(String(e), true));
  </script>
</body>
</html>
