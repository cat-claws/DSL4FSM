<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FSM Pipeline UI</title>
  <style>
    body { margin: 0; font-family: ui-sans-serif, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background: #f4f6f8; color: #1e2732; }
    .wrap { max-width: 1400px; margin: 20px auto; padding: 0 16px; }
    .card { background: #fff; border: 1px solid #d8dde4; border-radius: 10px; padding: 14px; margin-bottom: 14px; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    label { display: block; margin: 8px 0 4px; font-size: 12px; color: #5b6674; }
    select, input, textarea, button { width: 100%; box-sizing: border-box; border: 1px solid #d8dde4; border-radius: 8px; padding: 9px; font: inherit; }
    textarea { min-height: 220px; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; }
    button { background: #0d6efd; color: white; border-color: #0d6efd; cursor: pointer; font-weight: 600; margin-top: 10px; }
    .code { white-space: pre-wrap; max-height: 360px; overflow: auto; border: 1px solid #d8dde4; background: #fafbfc; border-radius: 8px; padding: 10px; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; }
    .pill { border: 1px solid #d8dde4; border-radius: 8px; background: #fafbfc; padding: 8px; font-size: 13px; }
    .error { color: #b42318; white-space: pre-wrap; }
    .ok { color: #067647; }
    .svg { border: 1px solid #d8dde4; border-radius: 8px; background: #fff; overflow: auto; max-height: 700px; }
    @media (max-width: 900px) { .grid2, .grid3 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h2 style="margin:0 0 6px;">FSM Build + Verify + Visualize</h2>
      <div style="color:#5b6674;">Static HTML frontend + backend process APIs.</div>
    </div>

    <div class="card">
      <div class="grid2">
        <div>
          <h3>Plan</h3>
          <label>Source</label>
          <select id="planSource">
            <option value="example">Example file</option>
            <option value="input">JSON input</option>
          </select>
          <label>Example</label>
          <select id="planExample"></select>
          <label>Plan JSON</label>
          <textarea id="planJson" placeholder='{"goal":"...","steps":[...]}'></textarea>
        </div>

        <div>
          <h3>Property</h3>
          <label>Source</label>
          <select id="propSource">
            <option value="example">Example file</option>
            <option value="input">JSON input</option>
          </select>
          <label>Example</label>
          <select id="propExample"></select>
          <label>Property JSON</label>
          <textarea id="propJson" placeholder='{"property":"..."}'></textarea>
        </div>
      </div>
      <div class="grid2" style="margin-top:10px;">
        <div>
          <label>Model</label>
          <input id="model" value="qwen2.5:7b">
        </div>
        <div>
          <label>Timeout seconds</label>
          <input id="timeoutSec" value="120">
        </div>
      </div>
      <button id="runBtn">Run Pipeline</button>
      <div id="status" style="margin-top:8px;"></div>
    </div>

    <div id="resultBlock" style="display:none;">
      <div class="card">
        <h3>Verification Summary</h3>
        <div class="grid3">
          <div class="pill"><b>Run ID</b><br><span id="runId"></span></div>
          <div class="pill"><b>Backend</b><br><span id="backend"></span></div>
          <div class="pill"><b>Run Dir</b><br><span id="runDir"></span></div>
        </div>
        <div class="grid3" style="margin-top:10px;">
          <div class="pill"><b>Full</b><br><span id="fullStatus"></span></div>
          <div class="pill"><b>Trace</b><br><span id="traceStatus"></span></div>
          <div class="pill"><b>Exit codes</b><br><span id="exitCodes"></span></div>
        </div>
      </div>

      <div class="card">
        <h3>FSM Graph</h3>
        <div id="svgBox" class="svg"></div>
      </div>

      <div class="card">
        <h3>Inputs and Generated FSM</h3>
        <div class="grid2">
          <div>
            <label>Plan in use</label>
            <div id="planUsed" class="code"></div>
          </div>
          <div>
            <label>Property in use</label>
            <div id="propUsed" class="code"></div>
          </div>
        </div>
        <label>Generated FSM JSON</label>
        <div id="fsmJson" class="code"></div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = window.location.protocol === 'file:' ? 'http://127.0.0.1:8800' : '';

    async function jget(url) {
      const r = await fetch(API_BASE + url);
      if (!r.ok) throw new Error(await r.text());
      return r.json();
    }

    function setStatus(msg, isErr=false) {
      const el = document.getElementById('status');
      el.className = isErr ? 'error' : 'ok';
      el.textContent = msg;
    }

    async function loadExamples() {
      const data = await jget('/api/examples');
      const planSel = document.getElementById('planExample');
      const propSel = document.getElementById('propExample');
      planSel.innerHTML = '';
      propSel.innerHTML = '';
      for (const n of data.plans || []) {
        const o = document.createElement('option');
        o.value = n; o.textContent = n; planSel.appendChild(o);
      }
      for (const n of data.properties || []) {
        const o = document.createElement('option');
        o.value = n; o.textContent = n; propSel.appendChild(o);
      }
    }

    async function runPipeline() {
      setStatus('Running backend pipeline...');
      document.getElementById('resultBlock').style.display = 'none';
      const payload = {
        plan_source: document.getElementById('planSource').value,
        property_source: document.getElementById('propSource').value,
        plan_example: document.getElementById('planExample').value,
        property_example: document.getElementById('propExample').value,
        plan_json: document.getElementById('planJson').value,
        property_json: document.getElementById('propJson').value,
        model: document.getElementById('model').value,
        timeout_sec: parseInt(document.getElementById('timeoutSec').value, 10)
      };
      const r = await fetch(API_BASE + '/api/run', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
      });
      const data = await r.json();
      if (!r.ok) {
        setStatus(data.error || 'Request failed', true);
        return;
      }

      setStatus('Done.');
      const v = data.verification || {};
      document.getElementById('runId').textContent = data.run_id || '';
      document.getElementById('backend').textContent = data.backend || '';
      document.getElementById('runDir').textContent = data.run_dir || '';
      document.getElementById('fullStatus').textContent = `${v.full.status} (${v.full.reason})`;
      document.getElementById('traceStatus').textContent = `${v.trace.status} (${v.trace.reason})`;
      document.getElementById('exitCodes').textContent = `full=${v.full.exit_code}, trace=${v.trace.exit_code}`;
      document.getElementById('svgBox').innerHTML = data.annotated_svg || '';
      document.getElementById('planUsed').textContent = data.plan_text || '';
      document.getElementById('propUsed').textContent = data.property_text || '';
      document.getElementById('fsmJson').textContent = data.fsm_text || '';
      document.getElementById('resultBlock').style.display = '';
    }

    document.getElementById('runBtn').addEventListener('click', () => {
      runPipeline().catch(e => setStatus(String(e), true));
    });

    loadExamples().catch(e => setStatus(String(e), true));
  </script>
</body>
</html>
